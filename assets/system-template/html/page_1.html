<!DOCTYPE html>
<html lang="es" class="prop-fill">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>COOTRAVIR C.T.A. - Propuesta de Seguridad Integral</title>
    <link href="slides-theme.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes cover-shield-in {
            from {
                opacity: 0;
                transform: scale(0.88) translateX(-18px);
                filter: blur(6px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateX(0);
                filter: blur(0);
            }
        }

        @keyframes cover-shield-float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes cover-shield-pulse {
            0%,
            100% {
                opacity: 0.45;
                transform: scale(1);
            }
            50% {
                opacity: 0.85;
                transform: scale(1.06);
            }
        }

        @keyframes cover-shield-halo-spin {
            to {
                transform: rotate(360deg);
            }
        }

        .cover-hero--split {
            width: 100%;
        }

        .cover-split {
            display: grid;
            grid-template-columns: 1fr;
            align-items: center;
            gap: clamp(1.25rem, 4vw, 2.5rem);
            width: 100%;
        }

        @media (min-width: 1024px) {
            .cover-split {
                grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
                gap: clamp(1.75rem, 4vw, 3.5rem);
            }
        }

        .cover-shield-col {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @media (min-width: 1024px) {
            .cover-shield-col {
                justify-content: flex-end;
                padding-right: clamp(0.5rem, 2vw, 1.5rem);
            }
        }

        .cover-shield-wrap {
            position: relative;
            width: min(92vw, 400px);
            max-width: 400px;
            animation: cover-shield-float 9s ease-in-out infinite 0.6s;
        }

        @media (min-width: 640px) {
            .cover-shield-wrap {
                width: min(85vw, 440px);
                max-width: 440px;
            }
        }

        @media (min-width: 1024px) {
            .cover-shield-wrap {
                width: min(48vw, 520px);
                max-width: 520px;
            }
        }

        .cover-shield-halo {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 118%;
            height: 118%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
            opacity: 0.55;
        }

        .cover-shield-halo::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 28px;
            background: conic-gradient(from 220deg, rgba(212, 175, 55, 0.35), transparent 32%, rgba(6, 182, 212, 0.35), transparent 65%, rgba(212, 175, 55, 0.28));
            animation: cover-shield-halo-spin 22s linear infinite;
            filter: blur(0.5px);
        }

        .cover-shield-glow {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 130%;
            height: 130%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle at 50% 45%, rgba(212, 175, 55, 0.22) 0%, rgba(6, 182, 212, 0.08) 38%, transparent 68%);
            animation: cover-shield-pulse 4.2s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        .cover-shield-img {
            position: relative;
            z-index: 1;
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            filter:
                drop-shadow(0 16px 48px rgba(0, 0, 0, 0.55))
                drop-shadow(0 0 28px rgba(6, 182, 212, 0.12));
            animation: cover-shield-in 1.05s var(--deck-3d-ease, cubic-bezier(0.22, 1, 0.36, 1)) both;
        }

        .cover-copy-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 0.5rem;
        }

        @media (min-width: 1024px) {
            .cover-copy-col {
                align-items: flex-start;
                text-align: left;
                padding-left: clamp(0.25rem, 1.5vw, 1rem);
            }
        }

        .cover-hero--split .cover-main-title {
            max-width: 100%;
            margin-left: 0;
            margin-right: 0;
            font-size: clamp(2rem, 5.5vw + 0.75rem, 4.75rem);
            line-height: 1.05;
            letter-spacing: 0.03em;
        }

        .cover-hero--split .cover-sub--1 {
            font-size: clamp(1.1rem, 2.4vw + 0.35rem, 1.85rem);
        }

        .cover-hero--split .cover-sub--2 {
            font-size: clamp(1.05rem, 2.1vw + 0.3rem, 1.5rem);
            margin-top: 0.5rem;
        }

        .cover-hero--split .cover-line-pulse {
            width: clamp(120px, 32vw, 320px);
            height: 5px;
            margin-top: clamp(0.75rem, 2vh, 1.25rem);
            margin-bottom: clamp(0.75rem, 2vh, 1.25rem);
            margin-left: auto;
            margin-right: auto;
        }

        @media (min-width: 1024px) {
            .cover-hero--split .cover-line-pulse {
                margin-left: 0;
                margin-right: auto;
            }
        }

        .cover-hero--split .cover-sub {
            max-width: 42rem;
            margin-left: auto;
            margin-right: auto;
        }

        .cover-slide .cover-chip h2 {
            font-size: clamp(0.72rem, 1.1vw + 0.5rem, 1.05rem);
        }

        @media (min-width: 1024px) {
            .cover-hero--split .cover-sub {
                margin-left: 0;
                margin-right: 0;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .cover-shield-wrap,
            .cover-shield-halo::before,
            .cover-shield-glow {
                animation: none !important;
            }

            .cover-shield-img {
                animation: none !important;
                opacity: 1 !important;
                transform: none !important;
                filter:
                    drop-shadow(0 12px 32px rgba(0, 0, 0, 0.5))
                    drop-shadow(0 0 16px rgba(6, 182, 212, 0.1)) !important;
            }
        }
    </style>
</head>
<body class="prop-fill">
    <div class="slide cover-slide cover-tech flex flex-col flex-1 min-h-0 justify-between py-4 sm:py-8 px-4 sm:px-8 md:px-12 relative">
        <div class="cover-tech-bg" aria-hidden="true">
            <div class="cover-tech-aurora"></div>
            <div class="cover-tech-grid"></div>
            <div class="cover-tech-noise"></div>
            <div class="cover-tech-scan"></div>
            <div class="cover-tech-particles">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        <div class="cover-tech-hud" aria-hidden="true"></div>

        <header class="cover-top z-20 w-full max-w-[min(1600px,96vw)] mx-auto shrink-0">
            <div class="cover-chip max-w-full">
                <div class="cover-chip-line shrink-0" aria-hidden="true"></div>
                <h2 class="m-0 leading-snug text-left">
                    COOPERATIVA DE TRABAJADORES VIGILANTES DE RISARALDA
                </h2>
            </div>
        </header>

        <main class="cover-hero cover-hero--split z-20 flex flex-1 min-h-0 flex-col justify-center w-full max-w-[min(1600px,96vw)] mx-auto py-2 sm:py-4">
            <div class="cover-split">
                <div class="cover-shield-col min-h-0">
                    <div class="cover-shield-wrap">
                        <div class="cover-shield-halo" aria-hidden="true"></div>
                        <div class="cover-shield-glow" aria-hidden="true"></div>
                        <img
                            src="images/logo-escudo-cootravir.png"
                            alt="Escudo institucional COOTRAVIR C.T.A."
                            class="cover-shield-img"
                            loading="eager"
                            onerror="this.src='images/fondo-login%20(1)%20-%20copia%20-%20copia.png';"
                        />
                    </div>
                </div>

                <div class="cover-copy-col min-h-0">
                    <h1 class="cover-main-title px-0 mt-0 w-full">
                        Propuesta de seguridad integral
                    </h1>

                    <div class="cover-line-pulse" role="presentation" aria-hidden="true"></div>

                    <p class="cover-sub cover-sub--1 m-0 px-0 leading-relaxed w-full">
                        Estructura operativa · Apoyos tecnológicos · Oferta económica
                    </p>
                    <p class="cover-sub cover-sub--2 m-0 px-0 w-full">
                        Presentado a: <span class="cover-client-name">TACUARA CLUB RESIDENCIAL</span>
                    </p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
