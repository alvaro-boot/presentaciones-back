<!DOCTYPE html>
<html lang="es" class="prop-fill">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Video — COOTRAVIR C.T.A.</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet"/>
    <link href="slides-theme.css" rel="stylesheet"/>
    <style>
        .video-slide-page {
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
            background: var(--soc-bg-deep);
        }

        .video-slide-top {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px 14px;
            background: linear-gradient(90deg, rgba(14, 36, 85, 0.98), rgba(10, 22, 48, 0.95));
            border-bottom: 1px solid rgba(212, 175, 55, 0.25);
        }

        .video-slide-top h1 {
            margin: 0;
            font-family: var(--font-display);
            font-size: clamp(0.95rem, 2vw, 1.05rem);
            font-weight: 700;
            color: var(--soc-text);
        }

        .video-slide-top p {
            margin: 0;
            font-size: 0.78rem;
            color: var(--soc-text-muted);
            max-width: 42ch;
        }

        .video-slide-body {
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(12px, 3vw, 28px);
            background:
                radial-gradient(ellipse 70% 50% at 50% 100%, rgba(74, 111, 165, 0.12), transparent 65%),
                var(--soc-bg-deep);
        }

        .video-frame-wrap {
            width: 100%;
            max-width: min(1100px, 100%);
            border-radius: var(--radius-panel);
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.22);
            box-shadow: var(--shadow-panel), 0 0 60px rgba(14, 36, 85, 0.25);
            background: #0a0f18;
        }

        .video-ratio {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            max-height: min(72vh, 72dvh);
        }

        .video-ratio iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        .video-slide-foot {
            flex-shrink: 0;
            padding: 8px 14px 12px;
            text-align: center;
            font-size: 0.72rem;
            color: var(--soc-text-muted);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(12, 20, 40, 0.5);
        }

        .video-slide-foot a {
            color: var(--cootravir-gold-light);
            text-decoration: none;
        }

        .video-slide-foot a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body class="prop-fill">
    <div class="slide video-slide-page">
        <header class="video-slide-top">
            <div>
                <h1><i class="fab fa-youtube" style="color:#ff0033;margin-right:0.35em;" aria-hidden="true"></i>Presentación en video</h1>
                <p>Reproduzca el contenido antes de continuar con los apoyos tecnológicos.</p>
            </div>
        </header>
        <div class="video-slide-body">
            <div class="video-frame-wrap">
                <div class="video-ratio">
                    <iframe
                        src="https://www.youtube.com/embed/JnwufjV6IHk?rel=0&modestbranding=1"
                        title="Video de YouTube — COOTRAVIR"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        referrerpolicy="strict-origin-when-cross-origin"
                        allowfullscreen
                        loading="lazy"></iframe>
                </div>
            </div>
        </div>
        <footer class="video-slide-foot">
            También en YouTube:
            <a href="https://www.youtube.com/watch?v=JnwufjV6IHk" target="_blank" rel="noopener noreferrer">youtube.com/watch?v=JnwufjV6IHk</a>
        </footer>
    </div>
</body>
</html>
